    .tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:16px}
    .tab{white-space:nowrap;padding:8px 14px;border-radius:20px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;font-size:12px;font-weight:600}
    .tab.active{background:#1d4ed8;color:#fff;border-color:#1d4ed8}
    .save-msg{background:#16a34a;color:#fff;border-radius:10px;padding:10px 16px;margin-bottom:12px;text-align:center;font-weight:600}
    .err-msg{color:#ef4444;font-size:13px;margin-top:4px;min-height:18px;text-align:center}
    table{width:100%;border-collapse:collapse}
    th{padding:10px 8px;font-size:11px;color:#64748b;text-align:center;font-weight:600;text-transform:uppercase;background:#0f172a}
    td{padding:12px 8px;text-align:center;border-top:1px solid #334155}

// ══════════════════════════════════════
// HELPERS
// ══════════════════════════════════════
function uid(name){
  return name.trim().toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/\s+/g,"_").replace(/[^a-z0-9_]/g,"");
}
function calcPoints(pick,result){
  if(!result||result.h===""||result.h===undefined) return null;
  const ph=parseInt(pick.h),pa=parseInt(pick.a),rh=parseInt(result.h),ra=parseInt(result.a);
  if(isNaN(ph)||isNaN(pa)||isNaN(rh)||isNaN(ra)) return null;
  if(ph===rh&&pa===ra) return 3;
  const pr=ph>pa?"H":ph<pa?"A":"D",rr=rh>ra?"H":rh<ra?"A":"D";
  return pr===rr?1:0;
}
function groupByDate(m){return m.reduce((a,x)=>{(a[x.date]=a[x.date]||[]).push(x);return a;},{});}
function fmtDate(d){return new Date(d+"T12:00:00").toLocaleDateString("es-MX",{weekday:"long",day:"numeric",month:"long"});}
function fmtTab(d){return new Date(d+"T12:00:00").toLocaleDateString("es-MX",{day:"numeric",month:"short"});}
function showMsg(msg){state.saveMsg=msg;render();setTimeout(()=>{state.saveMsg="";render();},2500);}


const grouped=groupByDate(MATCHES);
const dates=Object.keys(grouped).sort();

// FIREBASE LISTENERS

db.ref("users").on("value",snap=>{state.users=snap.val()||{};render();});
db.ref("results").on("value",snap=>{state.results=snap.val()||{};render();});
db.ref("picks").on("value",snap=>{
  state.picks=snap.val()||{};
  if(state.currentUserKey) state.localPicks=Object.assign({},state.picks[state.currentUserKey]||{});
  render();
});

// ══════════════════════════════════════
// MATCH CARD
// ══════════════════════════════════════
function matchCard(match,pick,result,opts){
  const gc=GROUP_COLORS[match.group]||"#6366f1";
  const hasResult=result&&result.h!==""&&result.h!==undefined;
  const locked=!opts.editable;
  const pts=(pick&&result)?calcPoints(pick,result):null;
  const gLabel=match.group.length===1?"Grupo "+match.group:match.group;
  const ph=pick?(pick.h!==undefined?pick.h:""):"";
  const pa=pick?(pick.a!==undefined?pick.a:""):"";
  const dis=locked?"disabled":"";
  let badgeHtml="";
  if(opts.showPoints&&pts!==null){
    const cls=pts===3?"bg-green":pts===1?"bg-yellow":"bg-red";
    badgeHtml=`<span class="badge ${cls}">${pts===3?"⭐ 3 pts":pts===1?"✓ 1 pt":"✗ 0 pts"}</span>`;
  }
  let resultHtml="";
  if(opts.isAdmin){
    const rh=result?(result.h!==undefined?result.h:""):"";
    const ra=result?(result.a!==undefined?result.a:""):"";
    resultHtml=`<div style="display:flex;align-items:center;gap:8px;margin-top:6px;padding:8px 12px;background:#0f172a;border-radius:10px;border:1px dashed #f59e0b">
      <span style="font-size:12px;color:#f59e0b;font-weight:600;flex:1">Resultado real:</span>
      <input class="score-input" type="number" min="0" max="20" value="${rh}" data-rid="${match.id}" data-side="h"/>
      <span style="color:#f59e0b">-</span>
      <input class="score-input" type="number" min="0" max="20" value="${ra}" data-rid="${match.id}" data-side="a"/>
    </div>
    <button style="width:100%;margin-top:6px;padding:7px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#94a3b8;font-size:12px;cursor:pointer" data-matchid="${match.id}">
      👁 Ver pronósticos de todos
    </button>`;
  } else if(hasResult){
    resultHtml=`<div style="display:flex;align-items:center;justify-content:center;gap:8px;background:#0f172a;border-radius:10px;padding:6px 12px;margin-top:4px">
      <span style="font-size:12px;color:#94a3b8">Resultado oficial:</span>
      <span style="font-weight:700;font-size:16px">${result.h} - ${result.a}</span>
    </div>`;
  }
  return`<div class="card" style="border-left:4px solid ${gc}">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span class="group-tag">${match.time} · ${gLabel}</span>${badgeHtml}
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin:8px 0">
      <div style="flex:1;text-align:right">
        <span style="font-size:22px">${match.hf}</span>
        <div style="font-size:12px;color:#cbd5e1;font-weight:600;margin-top:2px">${match.home}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
        <div style="display:flex;gap:6px;align-items:center">
          <input class="score-input" type="number" min="0" max="20" value="${ph}" ${dis} data-mid="${match.id}" data-side="h"/>
          <span style="color:#475569;font-size:20px">-</span>
          <input class="score-input" type="number" min="0" max="20" value="${pa}" ${dis} data-mid="${match.id}" data-side="a"/>
        </div>
        <span style="font-size:10px;color:${locked&&!opts.isAdmin?"#ef444480":"#475569"}">
          ${locked&&!opts.isAdmin?"🔒 Partido iniciado":"Tu predicción"}
        </span>
      </div>
      <div style="flex:1;text-align:left">
        <span style="font-size:22px">${match.af}</span>
        <div style="font-size:12px;color:#cbd5e1;font-weight:600;margin-top:2px">${match.away}</div>
      </div>
    </div>
    ${resultHtml}
    <div class="venue">📍 ${match.venue}</div>
  </div>`;
}

function dateTabs(ad){
  return`<div class="tabs">${dates.map(d=>`<button class="tab${d===ad?" active":""}" data-date="${d}">${fmtTab(d)}</button>`).join("")}</div>`;
}

function leaderboardTable(){
  const scores=Object.keys(state.users).map(u=>{
    let pts=0,ex=0,cor=0;
    MATCHES.forEach(m=>{
      const pick=state.picks[u]&&state.picks[u][m.id];
      const result=state.results[m.id];
      if(!pick||!result) return;
      const p=calcPoints(pick,result);
      if(p===3){pts+=3;ex++;cor++;}else if(p===1){pts+=1;cor++;}
    });
    return{key:u,name:state.users[u].name,pts,ex,cor};
  }).sort((a,b)=>b.pts-a.pts||b.ex-a.ex);
  const medals=["🥇","🥈","🥉"];
  if(!scores.length) return`<div style="padding:24px;text-align:center;color:#475569">Aún no hay participantes.</div>`;
  return`<table>
    <thead><tr><th>#</th><th>Jugador</th><th>Pts</th><th>⭐</th><th>✓</th></tr></thead>
    <tbody>${scores.map((s,i)=>`<tr style="cursor:pointer" data-viewuser="${s.key}">
      <td style="font-size:18px">${medals[i]||i+1}</td>
      <td style="font-weight:600;text-align:left">${s.name}</td>
      <td style="font-weight:800;font-size:20px;color:#f59e0b">${s.pts}</td>
      <td style="color:#22c55e">${s.ex}</td>
      <td style="color:#60a5fa">${s.cor}</td>
    </tr>`).join("")}</tbody>
  </table>
  <div style="padding:10px 16px;background:#0f172a;font-size:11px;color:#475569">⭐ Exacto=3pts · ✓ Resultado=1pt · Toca nombre para ver quiniela</div>`;
}

function viewAdminMatch(){

  const result=state.results[m.id]||{};
  const hasResult=result.h!==""&&result.h!==undefined;
  const rows=Object.keys(state.users).map(u=>{
    const pick=state.picks[u]?.[m.id];

function buildView(){
  switch(state.view){
    case "home":        return viewHome();
    case "quiniela":    return viewQuiniela();
    case "leaderboard": return viewLeaderboard();
    case "view_picks":  return viewUserPicks();
    case "admin":       return viewAdmin();
    case "admin_login": return viewAdminLogin();
    case "admin_match": return viewAdminMatch();
    default:            return viewHome();
  }
}
function render(){document.getElementById("app").innerHTML=buildView();attachEvents();}

// ══════════════════════════════════════
// EVENTS
// ══════════════════════════════════════
function attachEvents(){
  const ni=document.getElementById("nameInput");
  if(ni){ni.oninput=e=>state.nameInput=e.target.value;ni.onkeydown=e=>{if(e.key==="Enter")document.getElementById("btnEnter")?.click();};}
  const ai=document.getElementById("adminPassInput");
  if(ai){ai.oninput=e=>state.adminPassInput=e.target.value;ai.onkeydown=e=>{if(e.key==="Enter")document.getElementById("btnAdminEnter")?.click();};}

  // Back
  document.getElementById("btnBack")?.addEventListener("click",()=>{
    if(state.view==="view_picks") state.view="leaderboard";
    else if(state.view==="admin"){state.view="home";state.isAdmin=false;}
    else if(state.view==="admin_match") state.view="admin";
    else state.view="home";
    render();
  });

  // Enter — crea usuario si no existe, entra directo
  document.getElementById("btnEnter")?.addEventListener("click",async()=>{
    const name=state.nameInput.trim();
    if(!name){alert("Escribe tu nombre");return;}
    const btn=document.getElementById("btnEnter");
    btn.textContent="Entrando...";btn.disabled=true;
    try{
      const key=uid(name);
      const snap=await db.ref("users/"+key).once("value");
      if(!snap.val()){
        // Usuario nuevo — lo registra automáticamente
        await db.ref("users/"+key).set({name});
      }
      state.currentUserKey=key;
      state.localPicks=Object.assign({},state.picks[key]||{});
      state.activeDate=dates[0];
      state.view="quiniela";
    } catch(e){alert("Error: "+e.message);}
    btn.textContent="Entrar →";btn.disabled=false;
    render();
  });

  // Navigation
  document.getElementById("btnLeaderboard")?.addEventListener("click",()=>{state.view="leaderboard";render();});
  document.getElementById("btnGoLeaderboard")?.addEventListener("click",()=>{state.view="leaderboard";render();});
  document.getElementById("btnAdminLogin")?.addEventListener("click",()=>{state.view="admin_login";render();});
  document.getElementById("btnAdminEnter")?.addEventListener("click",()=>{
    if(state.adminPassInput===ADMIN_PASSWORD){state.isAdmin=true;state.activeDate=dates[0];state.view="admin";}
    else alert("Contraseña incorrecta");
    render();
  });
  document.getElementById("btnSignOut")?.addEventListener("click",()=>{
    state.currentUserKey=null;state.localPicks={};state.view="home";render();
  });

  // Date tabs
  document.querySelectorAll(".tab[data-date]").forEach(btn=>{btn.onclick=()=>{state.activeDate=btn.dataset.date;render();};});

  // Pick inputs
  document.querySelectorAll("input[data-mid]").forEach(inp=>{
    inp.oninput=()=>{
      const mid=inp.dataset.mid,side=inp.dataset.side;
      if(!state.localPicks[mid])state.localPicks[mid]={h:"",a:""};
      state.localPicks[mid][side]=inp.value;
    };
  });

  // Result inputs
  document.querySelectorAll("input[data-rid]").forEach(inp=>{
    inp.oninput=()=>{
      const mid=inp.dataset.rid,side=inp.dataset.side;
      if(!state.results[mid])state.results[mid]={h:"",a:""};
      state.results[mid][side]=inp.value;
    };
  });

  // Save picks
  ["btnSavePicks","btnSavePicks2"].forEach(id=>{
    document.getElementById(id)?.addEventListener("click",async()=>{
      await db.ref("picks/"+state.currentUserKey).set(state.localPicks);
      showMsg("¡Quiniela guardada! ✅");
    });
  });

  // Save results
  ["btnSaveResults","btnSaveResults2"].forEach(id=>{
    document.getElementById(id)?.addEventListener("click",async()=>{
      await db.ref("results").set(state.results);
      showMsg("Resultados guardados ✅");
    });
  });

  // Ver pronósticos
  document.querySelectorAll("button[data-matchid]").forEach(btn=>{
    btn.onclick=()=>{state.selectedMatch=MATCHES.find(m=>m.id===parseInt(btn.dataset.matchid));state.view="admin_match";render();};
  });

  // Ver quiniela usuario
  document.querySelectorAll("tr[data-viewuser]").forEach(row=>{
    row.onclick=()=>{state.viewingUser=row.dataset.viewuser;state.activeDate=dates[0];state.view="view_picks";render();};
  });
}

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
render();
</script>
</body>
</html>
